name: Image Build
on:
  workflow_call:

jobs:
  build-image:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            latest=auto
            prefix=,onlatest=false
            suffix=
          labels: |
            org.opencontainers.image.title=nginx-ipwatch
            org.opencontainers.image.description=Tails an Nginx access log, WHOIS-resolves new IPs, and stores them in SQLite with a web UI

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image and push to GitHub Container Registry
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Old Docker (< 20.10, e.g. 19.03) can't pull OCI-format manifests or
          # provenance attestation image-indexes. Disable provenance and force
          # Docker schema2 media types so legacy engines can pull these images.
          provenance: false
          sbom: false
          outputs: type=image,oci-mediatypes=false,push=${{ github.event_name != 'pull_request' }}

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
